    "dog11",

    "dog13",
    "dog14",
    "dog15",
    "dog16",

    "dog18"
];

const gallery = document.getElementById("gallery-grid");

dogs.forEach(dog => {
    gallery.innerHTML += `
        <div class="col-md-4">
            <img
                src="gallery/${dog}.jpg"
                class="img-fluid rounded shadow gallery-img"
                alt="${dog}">

    `;
});
</script>
